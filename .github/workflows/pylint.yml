name: Android and Python CI
on: [push, pull_request]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- SECTION 1: PYLINT (PYTHON) ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Pylint
        run: |
          python -m pip install --upgrade pip
          pip install pylint
      - name: Run Pylint
        # Adjust the path to where your .py files are located
        run: pylint $(git ls-files '*.py')

      # --- SECTION 2: ANDROID LINT (JAVA/KOTLIN) ---
      - name: Set up JDK
        uses: [actions/setup-java@v4](https://github.com)
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run Android Lint
        # 'lintDebug' is the standard task; you can also use './gradlew lint'
        run: ./gradlew lintDebug
